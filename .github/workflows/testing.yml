name: Doped

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
    strategy:
      matrix:
        build-type: [umi]
        ksu-type: [zako-susfs]
        bbg-type: [bbg]
        nomount-type: [nomount]
        droidspaces-type: [droidspaces]
        rekernel-type: [rekernel]

    steps:
      - uses: actions/checkout@v6

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils ccache

      - name: Preparing kernel sources
        run: |
            rm -rf android_kernel_xiaomi_sm8250
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8250.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm8250
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm8250/
            cp -r scripts android_kernel_xiaomi_sm8250/
            chmod +x ./android_kernel_xiaomi_sm8250/build.sh

      - name: Clone AnyKernel
        run: |
         git clone --depth=1 https://github.com/Medicee/AnyKernel3.git android_kernel_xiaomi_sm8250/anykernel     

      - name: Compile the kernel
        run: |
          echo "Starting to compile..."
            cd android_kernel_xiaomi_sm8250/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..

      - name: Create AnyKernel ZIP
        run: |
          cd android_kernel_xiaomi_sm8250/anykernel
          ZIP_NAME="APTKernel-${{ matrix.build-type }}-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.TIME }}.zip"
          zip -r9 "$ZIP_NAME" . -x ".git/*" ".gitignore" "*.zip"

      - name: Pack & upload artifacts (All builds)
        uses: actions/upload-artifact@v6
        with:
          name: perf-neon-${{ matrix.build-type }}-${{ matrix.ksu-type }}-${{ matrix.bbg-type }}-${{ matrix.nomount-type }}-${{ matrix.droidspaces-type }}-${{ matrix.rekernel-type }}-testing-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.TIME }}
          path: |
             android_kernel_xiaomi_sm8250/anykernel/*.zip
